workflows:
  ios-workflow:
    name: Kanatake iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kanatake.app
      vars:
        APP_STORE_APPLE_ID: "6760612778"
        XCODE_SCHEME: "App"
      node: v22.0.0
      xcode: 26.0
    scripts:
      - name: Install npm dependencies
        script: |
          cd $CM_BUILD_DIR
          npm install
      - name: Sync web assets to iOS project
        script: |
          cd $CM_BUILD_DIR
          chmod +x node_modules/.bin/cap
          npx cap sync ios
      - name: Set Push Notifications entitlement
        script: |
          cd $CM_BUILD_DIR/ios/App
          plutil -replace CODE_SIGN_ENTITLEMENTS -string "App/App.entitlements" App.xcodeproj/project.pbxproj 2>/dev/null || true
          # PlistBuddyで直接Xcodeプロジェクトに設定
          ruby -e '
            path = "App.xcodeproj/project.pbxproj"
            content = File.read(path)
            unless content.include?("CODE_SIGN_ENTITLEMENTS")
              content.gsub!(/CODE_SIGN_IDENTITY/, "CODE_SIGN_ENTITLEMENTS = \"App/App.entitlements\";\n\t\t\t\tCODE_SIGN_IDENTITY")
              File.write(path, content)
              puts "Added CODE_SIGN_ENTITLEMENTS"
            else
              puts "CODE_SIGN_ENTITLEMENTS already exists"
            end
          '
      - name: Resolve Swift Package Manager dependencies
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Set version and build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          sed -i '' 's/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = 27/' App.xcodeproj/project.pbxproj
          sed -i '' 's/MARKETING_VERSION = [^;]*/MARKETING_VERSION = 1.2/' App.xcodeproj/project.pbxproj
          echo "Set CURRENT_PROJECT_VERSION=27, MARKETING_VERSION=1.2"
      - name: Build ipa for distribution
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/App.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
