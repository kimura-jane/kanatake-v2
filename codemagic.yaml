workflows:
  ios-workflow:
    name: Kanatake iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kanatake.app
      vars:
        APP_STORE_APPLE_ID: "6760612778"
        XCODE_SCHEME: "App"
      node: v22.0.0
    scripts:
      - name: Install npm dependencies
        script: |
          cd $CM_BUILD_DIR
          npm install
      - name: Sync web assets to iOS project
        script: |
          cd $CM_BUILD_DIR
          chmod +x node_modules/.bin/cap
          npx cap sync ios
      - name: Resolve Swift Package Manager dependencies
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" || echo "0")
          if [ -z "$LATEST_BUILD_NUMBER" ] || [ "$LATEST_BUILD_NUMBER" = "null" ]; then
            LATEST_BUILD_NUMBER=0
          fi
          NEW_BUILD_NUMBER=$(($LATEST_BUILD_NUMBER + 2))
          echo "Setting build number to $NEW_BUILD_NUMBER"
          agvtool new-version -all $NEW_BUILD_NUMBER
      - name: Build ipa for distribution
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/App.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
